# =============================================
# Server Basic Configuration
# =============================================
server.port=8082
server.servlet.context-path=/
# Unified request encoding to UTF-8
spring.servlet.encoding.charset=UTF-8
spring.servlet.encoding.enabled=true
spring.servlet.encoding.force=true

# =============================================
# MySQL DataSource Configuration (HikariCP Pool)
# =============================================
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/oa_office?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=oa_user
spring.datasource.password=root

# HikariCP connection pool parameters
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# =============================================
# MyBatis-Plus 3.5.x Configuration
# =============================================
# Mapper XML file scan path
mybatis-plus.mapper-locations=classpath:mapper/*.xml
# Entity class package scan path
mybatis-plus.type-aliases-package=org.buu.oa.entity
# Enable auto mapping between DB underscore and Java camelCase
mybatis-plus.configuration.map-underscore-to-camel-case=true
# Print SQL to console (for development debug)
mybatis-plus.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl
# Primary key auto increment strategy
mybatis-plus.global-config.db-config.id-type=auto

# =============================================
# Redis 7.x Configuration (Cache + ZSet Delay Queue)
# =============================================
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=
spring.data.redis.database=0
# Connection establishment timeout
spring.data.redis.connect-timeout=10s

# Lettuce connection pool parameters
spring.data.redis.lettuce.pool.min-idle=5
spring.data.redis.lettuce.pool.max-idle=20
spring.data.redis.lettuce.pool.max-active=20
# Max wait time, -1 means infinite wait
spring.data.redis.lettuce.pool.max-wait=-1ms

# =============================================
# File Upload Configuration (for invoice upload)
# =============================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB

# =============================================
# Jackson Global Date Format
# =============================================
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss
spring.jackson.time-zone=Asia/Shanghai
spring.jackson.serialization.write-dates-as-timestamps=false

# =============================================
# Custom JWT Configuration (for SpringSecurity + JWT)
# =============================================
jwt.secret=oa-office-system-secret-key-2026-abcdefghijklmnopqrstuvwxyz
# Token validity period: 24 hours (unit: millisecond)
jwt.expire-time=86400000

# =============================================
# Logging Configuration
# =============================================
logging.level.root=info
logging.level.com.buu.oa=debug
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{50} - %msg%n