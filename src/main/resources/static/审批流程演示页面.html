<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OA多级审批状态机演示页面</title>
    <!-- 引入Vue3 -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <!-- 引入Element Plus -->
    <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css">
    <script src="https://unpkg.com/element-plus"></script>
    <!-- 引入Element Plus图标 -->
    <script src="https://unpkg.com/element-plus/dist/locale/zh-cn.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #f5f7fa;
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
        }
        .page-header {
            background: #001529;
            color: #fff;
            padding: 16px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .page-title {
            font-size: 20px;
            font-weight: 600;
        }
        .role-selector {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .main-container {
            max-width: 1200px;
            margin: 24px auto;
            padding: 0 24px;
        }
        .tip-card {
            margin-bottom: 20px;
            background: #ecf5ff;
            border-color: #b3d8ff;
            color: #409eff;
        }
        .section-card {
            margin-bottom: 20px;
        }
        .card-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 16px;
            color: #303133;
        }
        .status-tag {
            font-weight: 500;
        }
        .timeline-item {
            padding-bottom: 16px;
        }
        .timeline-time {
            font-size: 12px;
            color: #909399;
            margin-bottom: 4px;
        }
        .timeline-content {
            font-size: 14px;
            color: #303133;
        }
    </style>
</head>
<body>
<div id="app">
    <!-- 顶部标题栏 -->
    <div class="page-header">
        <div class="page-title">🏢 OA协同办公平台 - 多级审批状态机演示</div>
        <div class="role-selector">
            <span>当前模拟角色：</span>
            <el-select v-model="currentRole" style="width: 160px" @change="onRoleChange">
                <el-option label="普通员工" :value="2"></el-option>
                <el-option label="部门经理" :value="3"></el-option>
                <el-option label="财务管理员" :value="5"></el-option>
            </el-select>
        </div>
    </div>

    <div class="main-container">
        <!-- 操作提示 -->
        <el-card class="tip-card" shadow="never">
            <strong>演示说明：</strong>本页面为纯前端模拟页面，无需后端。切换上方角色可体验不同权限的操作，完整流程：员工提交报销 → 经理审批 → 财务审批 → 流程结束。
        </el-card>

        <!-- 员工：报销提交表单 -->
        <el-card v-if="currentRole === 2" class="section-card" shadow="never">
            <template #header>
                <div class="card-title">📝 发起报销申请</div>
            </template>
            <el-form :model="expenseForm" label-width="100px" style="max-width: 600px">
                <el-form-item label="报销类型" prop="expenseType">
                    <el-select v-model="expenseForm.expenseType" placeholder="请选择报销类型" style="width: 100%">
                        <el-option label="差旅费" value="差旅费"></el-option>
                        <el-option label="招待费" value="招待费"></el-option>
                        <el-option label="办公费" value="办公费"></el-option>
                        <el-option label="交通费" value="交通费"></el-option>
                    </el-select>
                </el-form-item>
                <el-form-item label="报销金额" prop="totalAmount">
                    <el-input-number v-model="expenseForm.totalAmount" :min="0" :precision="2" style="width: 100%"></el-input-number>
                </el-form-item>
                <el-form-item label="报销说明" prop="description">
                    <el-input v-model="expenseForm.description" type="textarea" :rows="3" placeholder="请填写报销事由"></el-input>
                </el-form-item>
                <el-form-item>
                    <el-button type="primary" @click="submitExpense">提交报销申请</el-button>
                    <el-button @click="resetForm">重置</el-button>
                </el-form-item>
            </el-form>
        </el-card>

        <!-- 报销单列表 -->
        <el-card class="section-card" shadow="never">
            <template #header>
                <div class="card-title">📋 报销单列表</div>
            </template>
            <el-table :data="expenseList" border stripe>
                <el-table-column prop="reportNo" label="报销单号" width="160"></el-table-column>
                <el-table-column prop="expenseType" label="报销类型" width="100"></el-table-column>
                <el-table-column prop="totalAmount" label="报销金额(元)" width="120" align="right">
                    <template #default="scope">
                        ¥{{ scope.row.totalAmount.toFixed(2) }}
                    </template>
                </el-table-column>
                <el-table-column prop="description" label="报销说明"></el-table-column>
                <el-table-column prop="status" label="状态" width="140">
                    <template #default="scope">
                        <el-tag :type="getStatusType(scope.row.status)" effect="light" class="status-tag">
                            {{ getStatusText(scope.row.status) }}
                        </el-tag>
                    </template>
                </el-table-column>
                <el-table-column label="操作" width="220" fixed="right">
                    <template #default="scope">
                        <!-- 经理：仅可审批待处理单据 -->
                        <template v-if="currentRole === 3 && scope.row.status === 'PENDING'">
                            <el-button type="success" size="small" @click="handleApprove(scope.row.id, true)">
                                审批通过
                            </el-button>
                            <el-button type="danger" size="small" @click="handleApprove(scope.row.id, false)">
                                拒绝
                            </el-button>
                        </template>
                        <!-- 财务：仅可审批经理已通过单据 -->
                        <template v-if="currentRole === 5 && scope.row.status === 'MANAGER_APPROVED'">
                            <el-button type="success" size="small" @click="handleApprove(scope.row.id, true)">
                                审批通过
                            </el-button>
                            <el-button type="danger" size="small" @click="handleApprove(scope.row.id, false)">
                                拒绝
                            </el-button>
                        </template>
                        <!-- 查看审批记录 -->
                        <el-button type="primary" size="small" text @click="viewRecords(scope.row)">
                            审批记录
                        </el-button>
                    </template>
                </el-table-column>
            </el-table>
        </el-card>

        <!-- 审批记录详情 -->
        <el-card v-if="selectedReport" class="section-card" shadow="never">
            <template #header>
                <div class="card-title">
                    📜 审批历史记录（单号：{{ selectedReport.reportNo }}）
                </div>
            </template>
            <el-timeline>
                <el-timeline-item
                    v-for="(item, index) in currentRecords"
                    :key="index"
                    :timestamp="item.time"
                    :type="item.result === 1 ? 'success' : 'danger'"
                    placement="top"
                >
                    <h4>{{ item.approver }} · {{ item.result === 1 ? '审批通过' : '审批拒绝' }}</h4>
                    <p style="color: #606266; margin-top: 4px">{{ item.opinion }}</p>
                </el-timeline-item>
            </el-timeline>
        </el-card>
    </div>
</div>

<script>
    const { createApp, ref, reactive, computed } = Vue;

    const app = createApp({
        setup() {
            // 当前角色：2=普通员工，3=部门经理，5=财务
            const currentRole = ref(2);
            // 报销表单
            const expenseForm = reactive({
                expenseType: '',
                totalAmount: 0,
                description: ''
            });
            // 模拟报销单数据
            const expenseList = ref([
                {
                    id: 1,
                    reportNo: 'BX20250519001',
                    expenseType: '差旅费',
                    totalAmount: 2350,
                    description: '北京出差差旅费用',
                    status: 'COMPLETED'
                },
                {
                    id: 2,
                    reportNo: 'BX20250518002',
                    expenseType: '招待费',
                    totalAmount: 1680,
                    description: '客户招待餐饮费用',
                    status: 'PENDING'
                },
                {
                    id: 3,
                    reportNo: 'BX20250517003',
                    expenseType: '办公费',
                    totalAmount: 890,
                    description: '办公耗材采购费用',
                    status: 'MANAGER_APPROVED'
                },
                {
                    id: 4,
                    reportNo: 'BX20250516004',
                    expenseType: '差旅费',
                    totalAmount: 1200,
                    description: '税务办理出差费用',
                    status: 'REJECTED'
                }
            ]);

            // 模拟审批记录数据
            const approvalRecords = ref({
                1: [
                    { approver: '张三(员工)', result: 1, opinion: '提交报销申请', time: '2026-05-19 09:30:00' },
                    { approver: '李四(部门经理)', result: 1, opinion: '同意报销，请走财务流程', time: '2026-05-19 10:15:00' },
                    { approver: '赵六(财务管理员)', result: 1, opinion: '发票合规，金额无误，同意付款', time: '2026-05-19 11:00:00' }
                ],
                2: [
                    { approver: '王五(员工)', result: 1, opinion: '提交报销申请', time: '2026-05-18 14:20:00' }
                ],
                3: [
                    { approver: '孙七(员工)', result: 1, opinion: '提交报销申请', time: '2026-05-17 09:10:00' },
                    { approver: '李四(部门经理)', result: 1, opinion: '办公必需，同意提交财务', time: '2026-05-17 16:30:00' }
                ],
                4: [
                    { approver: '周八(员工)', result: 1, opinion: '提交报销申请', time: '2026-05-16 11:00:00' },
                    { approver: '李四(部门经理)', result: 2, opinion: '出差事由不明确，请补充说明', time: '2026-05-16 15:40:00' }
                ]
            });

            const selectedReport = ref(null);
            const currentRecords = computed(() => {
                if (!selectedReport.value) return [];
                return approvalRecords.value[selectedReport.value.id] || [];
            });

            // 状态对应标签颜色
            const getStatusType = (status) => {
                const map = {
                    'PENDING': 'warning',
                    'MANAGER_APPROVED': 'primary',
                    'COMPLETED': 'success',
                    'REJECTED': 'danger'
                };
                return map[status] || 'info';
            };

            // 状态中文文本
            const getStatusText = (status) => {
                const map = {
                    'PENDING': '待经理审批',
                    'MANAGER_APPROVED': '待财务审批',
                    'COMPLETED': '已完成',
                    'REJECTED': '已拒绝'
                };
                return map[status] || status;
            };

            // 角色切换提示
            const onRoleChange = (val) => {
                const roleMap = { 2: '普通员工', 3: '部门经理', 5: '财务管理员' };
                ElementPlus.ElMessage.info(`已切换为【${roleMap[val]}】视角`);
            };

            // 提交报销
            const submitExpense = () => {
                if (!expenseForm.expenseType || expenseForm.totalAmount <= 0) {
                    ElementPlus.ElMessage.warning('请完整填写报销信息');
                    return;
                }
                // 生成模拟单号
                const newId = Date.now();
                const reportNo = 'BX' + new Date().toISOString().slice(0,10).replace(/-/g,'') + String(Math.floor(Math.random()*1000)).padStart(3,'0');
                
                expenseList.value.unshift({
                    id: newId,
                    reportNo: reportNo,
                    expenseType: expenseForm.expenseType,
                    totalAmount: expenseForm.totalAmount,
                    description: expenseForm.description,
                    status: 'PENDING'
                });

                // 初始化审批记录
                approvalRecords.value[newId] = [
                    {
                        approver: '当前用户(员工)',
                        result: 1,
                        opinion: expenseForm.description || '提交报销申请',
                        time: new Date().toLocaleString('zh-CN')
                    }
                ];

                ElementPlus.ElMessage.success('报销申请提交成功，状态：待经理审批');
                resetForm();
            };

            // 重置表单
            const resetForm = () => {
                expenseForm.expenseType = '';
                expenseForm.totalAmount = 0;
                expenseForm.description = '';
            };

            // 审批操作
            const handleApprove = (id, isApprove) => {
                const report = expenseList.value.find(item => item.id === id);
                if (!report) return;

                let newStatus = '';
                let approverName = '';
                let opinion = '';

                if (currentRole.value === 3) {
                    approverName = '当前用户(部门经理)';
                    if (isApprove) {
                        newStatus = 'MANAGER_APPROVED';
                        opinion = '同意报销，转财务审核';
                    } else {
                        newStatus = 'REJECTED';
                        opinion = '不符合报销标准，予以驳回';
                    }
                } else if (currentRole.value === 5) {
                    approverName = '当前用户(财务管理员)';
                    if (isApprove) {
                        newStatus = 'COMPLETED';
                        opinion = '审核通过，款项已安排支付';
                    } else {
                        newStatus = 'REJECTED';
                        opinion = '发票信息有误，驳回重提';
                    }
                }

                // 更新状态
                report.status = newStatus;
                // 添加审批记录
                approvalRecords.value[id].push({
                    approver: approverName,
                    result: isApprove ? 1 : 2,
                    opinion: opinion,
                    time: new Date().toLocaleString('zh-CN')
                });

                const msg = isApprove ? '审批通过' : '已拒绝';
                ElementPlus.ElMessage.success(msg + '，单据状态已更新');
                
                // 如果正在查看该单据，刷新记录
                if (selectedReport.value && selectedReport.value.id === id) {
                    selectedReport.value = { ...report };
                }
            };

            // 查看审批记录
            const viewRecords = (row) => {
                selectedReport.value = row;
            };

            return {
                currentRole,
                expenseForm,
                expenseList,
                selectedReport,
                currentRecords,
                getStatusType,
                getStatusText,
                onRoleChange,
                submitExpense,
                resetForm,
                handleApprove,
                viewRecords
            };
        }
    });

    // 全局注册Element Plus
    app.use(ElementPlus, { locale: ElementPlusLocaleZhCn });
    app.mount('#app');
</script>
</body>
</html>
