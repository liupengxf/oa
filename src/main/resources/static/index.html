<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OA协同办公平台</title>
    <script src="https://cdn.jsdelivr.net/npm/vue@3.4.21/dist/vue.global.prod.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/element-plus@2.6.1/dist/index.full.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/element-plus@2.6.1/dist/index.css">
    <script src="https://cdn.jsdelivr.net/npm/axios@1.6.8/dist/axios.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; }
        .app-container { display: flex; height: 100vh; }
        .sidebar { width: 200px; background: #263445; color: #fff; display: flex; flex-direction: column; }
        .sidebar-header { padding: 20px; text-align: center; border-bottom: 1px solid #3a4d63; }
        .sidebar-header h1 { font-size: 18px; font-weight: 600; }
        .nav-menu { flex: 1; padding: 10px 0; }
        .nav-item { padding: 12px 20px; cursor: pointer; display: flex; align-items: center; gap: 10px; transition: background 0.2s; }
        .nav-item:hover { background: #3a4d63; }
        .nav-item.active { background: #1890ff; }
        .nav-item .icon { font-size: 18px; }
        .main-content { flex: 1; display: flex; flex-direction: column; background: #f0f2f5; }
        .top-bar { height: 60px; background: #fff; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
        .top-bar-left { display: flex; align-items: center; gap: 10px; }
        .top-bar-right { display: flex; align-items: center; gap: 20px; }
        .content-area { flex: 1; overflow: hidden; }
        .content-area iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>
    <div id="app">
        <div class="app-container">
            <div class="sidebar">
                <div class="sidebar-header">
                    <h1>OA办公平台</h1>
                </div>
                <div class="nav-menu">
                    <div v-for="menu in menus" :key="menu.id" 
                         class="nav-item" :class="{ active: currentMenu === menu.path }"
                         @click="navigate(menu.path)">
                        <span class="icon">{{ getIcon(menu.icon) }}</span>
                        <span>{{ menu.menuName }}</span>
                    </div>
                </div>
            </div>
            
            <div class="main-content">
                <div class="top-bar">
                    <div class="top-bar-left">
                        <span style="font-size: 20px; font-weight: 600;">{{ getCurrentMenuName() }}</span>
                    </div>
                    <div class="top-bar-right">
                        <el-badge :value="unreadCount" class="item">
                            <el-button icon="Bell" @click="navigate('/notice')"></el-button>
                        </el-badge>
                        <el-dropdown>
                            <span class="el-dropdown-link">
                                {{ currentUser?.username || '用户' }} <i class="el-icon-arrow-down"></i>
                            </span>
                            <template #dropdown>
                                <el-dropdown-menu>
                                    <el-dropdown-item @click="handleLogout">退出登录</el-dropdown-item>
                                </el-dropdown-menu>
                            </template>
                        </el-dropdown>
                    </div>
                </div>
                
                <div class="content-area">
                    <iframe :src="currentUrl" frameborder="0"></iframe>
                </div>
            </div>
        </div>
    </div>

    <script>
        const { createApp, ref, onMounted } = Vue;
        const { ElMessage } = ElementPlus;

        const app = createApp({
            setup() {
                const currentMenu = ref('/dashboard');
                const menus = ref([
                    { id: 1, menuName: '工作台', path: '/dashboard', icon: 'DataBoard' },
                    { id: 2, menuName: '考勤管理', path: '/attendance', icon: 'Calendar' },
                    { id: 3, menuName: '审批管理', path: '/approval', icon: 'Document' },
                    { id: 4, menuName: '通知公告', path: '/notice', icon: 'Bell' },
                    { id: 5, menuName: '数据报表', path: '/report', icon: 'DataAnalysis' }
                ]);
                const currentUser = ref({ username: '管理员', empId: 1 });
                const unreadCount = ref(0);

                const pathMap = {
                    '/dashboard': 'pages/dashboard.html',
                    '/attendance': 'pages/attendance.html',
                    '/approval': 'pages/approval.html',
                    '/notice': 'pages/notice.html',
                    '/report': 'pages/report.html'
                };

                const currentUrl = ref(pathMap['/dashboard']);

                const getIcon = (icon) => {
                    const icons = {
                        'DataBoard': '📊',
                        'Calendar': '📅',
                        'Document': '📋',
                        'Bell': '🔔',
                        'DataAnalysis': '📈'
                    };
                    return icons[icon] || '📄';
                };

                const getCurrentMenuName = () => {
                    const menu = menus.value.find(m => m.path === currentMenu.value);
                    return menu ? menu.menuName : '工作台';
                };

                const navigate = (path) => {
                    currentMenu.value = path;
                    currentUrl.value = pathMap[path] || pathMap['/dashboard'];
                };

                const handleLogout = () => {
                    ElMessage.success('已退出登录');
                };

                const fetchUnreadCount = async () => {
                    try {
                        const res = await axios.get('/api/notice/unread/count');
                        if (res.data.code === 200) {
                            unreadCount.value = res.data.data.count;
                        }
                    } catch (e) {}
                };

                window.addEventListener('message', (event) => {
                    if (event.data && event.data.type === 'navigate') {
                        navigate(event.data.path);
                    }
                });

                onMounted(() => {
                    fetchUnreadCount();
                });

                return {
                    currentMenu,
                    menus,
                    currentUser,
                    unreadCount,
                    currentUrl,
                    getIcon,
                    getCurrentMenuName,
                    handleLogout,
                    navigate
                };
            }
        });

        app.use(ElementPlus);
        app.mount('#app');
    </script>
</body>
</html>
