<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OA协同办公平台</title>
    <script src="https://cdn.jsdelivr.net/npm/vue@3.4.21/dist/vue.global.prod.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/element-plus@2.6.1/dist/index.full.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/element-plus@2.6.1/dist/index.css">
    <script src="https://cdn.jsdelivr.net/npm/axios@1.6.8/dist/axios.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; }
        .app-container { display: flex; height: 100vh; }
        .sidebar { width: 200px; background: #263445; color: #fff; display: flex; flex-direction: column; }
        .sidebar-header { padding: 20px; text-align: center; border-bottom: 1px solid #3a4d63; }
        .sidebar-header h1 { font-size: 18px; font-weight: 600; }
        .nav-menu { flex: 1; padding: 10px 0; }
        .nav-item { padding: 12px 20px; cursor: pointer; display: flex; align-items: center; gap: 10px; transition: background 0.2s; }
        .nav-item:hover { background: #3a4d63; }
        .nav-item.active { background: #1890ff; }
        .nav-item .icon { font-size: 18px; }
        .main-content { flex: 1; display: flex; flex-direction: column; background: #f0f2f5; }
        .top-bar { height: 60px; background: #fff; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
        .top-bar-left { display: flex; align-items: center; gap: 10px; }
        .top-bar-right { display: flex; align-items: center; gap: 20px; }
        .content-area { flex: 1; overflow-y: auto; padding: 20px; }
        
        .attendance-page { padding: 20px; }
        .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .page-header h2 { font-size: 22px; color: #333; }
        .header-right { display: flex; gap: 10px; }
        .calendar-section { background: #fff; border-radius: 8px; padding: 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .calendar-cell { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 8px 4px; width: 100%; height: 100%; min-height: 70px; box-sizing: border-box; }
        .date-num { font-size: 18px; font-weight: bold; color: #333; margin-bottom: 4px; }
        .status-text { font-size: 12px; color: #666; }
        .el-calendar-table .el-calendar-day.status-normal .status-text { color: #52c41a; }
        .el-calendar-table .el-calendar-day.status-late .status-text { color: #faad14; }
        .el-calendar-table .el-calendar-day.status-absent .status-text { color: #f5222d; }
        .el-calendar-table .el-calendar-day.status-sick .status-text { color: #1890ff; }
        .stats-section { background: #fff; border-radius: 8px; padding: 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .stats-section h3 { font-size: 18px; margin-bottom: 15px; color: #333; }
        .stats-cards { display: flex; gap: 15px; }
        .stat-card { flex: 1; display: flex; align-items: center; gap: 15px; padding: 15px; border-radius: 8px; }
        .stat-card.normal { background: #f6ffed; }
        .stat-card.late { background: #fffbe6; }
        .stat-card.absent { background: #fff1f0; }
        .stat-card.sick { background: #e6f7ff; }
        .stat-card.total { background: #f5f5f5; }
        .stat-icon { font-size: 28px; }
        .stat-info { display: flex; flex-direction: column; }
        .stat-value { font-size: 24px; font-weight: 600; color: #333; }
        .stat-label { font-size: 14px; color: #666; }
        .detail-section { background: #fff; border-radius: 8px; padding: 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
        .detail-section h3 { font-size: 18px; margin-bottom: 15px; color: #333; }
        
        .meeting-page { padding: 20px; }
        .meeting-page .el-tabs__content { padding: 10px 0; }
        .available-message { background: #f6ffed; color: #52c41a; border: 1px solid #b7eb8f; }
        .unavailable-message { background: #fff1f0; color: #f5222d; border: 1px solid #ffccc7; }
        .room-color-1 { background: #e6f7ff; color: #1890ff; }
        .room-color-2 { background: #f6ffed; color: #52c41a; }
        .room-color-3 { background: #fffbe6; color: #faad14; }
        .room-color-4 { background: #fff1f0; color: #f5222d; }
        .room-color-5 { background: #f9f0ff; color: #722ed1; }
        
        .report-page { padding: 20px; }
        .charts-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
        .chart-card { background: #fff; border-radius: 8px; padding: 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
        .chart-card.wide { grid-column: span 2; }
        .chart-header { margin-bottom: 15px; }
        .chart-header h3 { font-size: 16px; color: #333; font-weight: 600; }
        .chart-container { height: 350px; }
    </style>
</head>
<body>
    <div id="app">
        <div class="app-container">
            <div class="sidebar">
                <div class="sidebar-header">
                    <h1>OA办公平台</h1>
                </div>
                <div class="nav-menu">
                    <div v-for="menu in menus" :key="menu.id" 
                         class="nav-item" :class="{ active: currentMenu === menu.path }"
                         @click="navigate(menu.path)">
                        <span class="icon">{{ getIcon(menu.icon) }}</span>
                        <span>{{ menu.menuName }}</span>
                    </div>
                </div>
            </div>
            
            <div class="main-content">
                <div class="top-bar">
                    <div class="top-bar-left">
                        <span style="font-size: 20px; font-weight: 600;">{{ getCurrentMenuName() }}</span>
                    </div>
                    <div class="top-bar-right">
                        <el-badge :value="unreadCount" class="item">
                            <el-button icon="Bell" @click="navigate('/notice')"></el-button>
                        </el-badge>
                        <span>{{ currentEmployee?.name || '用户' }}</span>
                    </div>
                </div>
                
                <div class="content-area">
                    <component :is="currentComponent"></component>
                </div>
            </div>
        </div>
    </div>

    <script>
        const { createApp, ref, computed, onMounted } = Vue;
        const { ElMessage } = ElementPlus;

        const app = createApp({
            setup() {
                const currentEmployee = ref(null);
                const currentMenu = ref('/dashboard');
                const menus = ref([
                    { id: 1, menuName: '工作台', path: '/dashboard', icon: 'DataBoard' },
                    { id: 2, menuName: '考勤管理', path: '/attendance', icon: 'Calendar' },
                    { id: 3, menuName: '审批流', path: '/approval', icon: 'Document' },
                    { id: 4, menuName: '会议预约', path: '/meeting', icon: 'Meeting' },
                    { id: 5, menuName: '通知中心', path: '/notice', icon: 'Bell' },
                    { id: 6, menuName: '数据看板', path: '/report', icon: 'DataAnalysis' }
                ]);
                const unreadCount = ref(0);

                const componentMap = {
                    '/dashboard': 'page-dashboard',
                    '/attendance': 'page-attendance',
                    '/approval': 'page-approval',
                    '/meeting': 'page-meeting',
                    '/notice': 'page-notice',
                    '/report': 'page-report'
                };

                const currentComponent = computed(() => componentMap[currentMenu.value] || 'page-dashboard');

                const loadCurrentEmployee = async () => {
                    try {
                        const res = await axios.get('/api/employee/1');
                        if (res.data.code === 200) {
                            currentEmployee.value = res.data.data;
                        }
                    } catch (e) {
                        console.error('加载员工信息失败', e);
                    }
                };

                const getIcon = (icon) => {
                    const icons = {
                        'DataBoard': '📊',
                        'Calendar': '📅',
                        'Document': '📋',
                        'Bell': '🔔',
                        'DataAnalysis': '📈',
                        'Meeting': '🤝'
                    };
                    return icons[icon] || '📄';
                };

                const getCurrentMenuName = () => {
                    const menu = menus.value.find(m => m.path === currentMenu.value);
                    return menu ? menu.menuName : '工作台';
                };

                const navigate = (path) => {
                    currentMenu.value = path;
                };

                const fetchUnreadCount = async () => {
                    try {
                        const res = await axios.get('/api/notice/unread/count');
                        if (res.data.code === 200) {
                            unreadCount.value = res.data.data.count;
                        }
                    } catch (e) {}
                };

                onMounted(() => {
                    loadCurrentEmployee();
                    fetchUnreadCount();
                });

                return {
                    currentEmployee,
                    currentMenu,
                    menus,
                    unreadCount,
                    currentComponent,
                    getIcon,
                    getCurrentMenuName,
                    navigate
                };
            }
        });

        app.component('page-dashboard', {
            template: `
                <div class="dashboard-page">
                    <div style="font-size: 24px; font-weight: 600; margin-bottom: 20px;">欢迎来到工作台</div>
                    <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px;">
                        <div style="background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.1);">
                            <div style="font-size: 14px; color: #666;">今日待办</div>
                            <div style="font-size: 32px; font-weight: 600; color: #333; margin-top: 10px;">5</div>
                        </div>
                        <div style="background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.1);">
                            <div style="font-size: 14px; color: #666;">待审批</div>
                            <div style="font-size: 32px; font-weight: 600; color: #333; margin-top: 10px;">3</div>
                        </div>
                        <div style="background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.1);">
                            <div style="font-size: 14px; color: #666;">新通知</div>
                            <div style="font-size: 32px; font-weight: 600; color: #333; margin-top: 10px;">2</div>
                        </div>
                        <div style="background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.1);">
                            <div style="font-size: 14px; color: #666;">本月考勤</div>
                            <div style="font-size: 32px; font-weight: 600; color: #333; margin-top: 10px;">22天</div>
                        </div>
                    </div>
                    <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 20px; margin-top: 20px;">
                        <div style="background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.1);">
                            <div style="font-size: 18px; font-weight: 600; margin-bottom: 15px;">考勤统计图表</div>
                            <div style="height: 300px; display: flex; align-items: center; justify-content: center; color: #999;">图表区域</div>
                        </div>
                        <div style="background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.1);">
                            <div style="font-size: 18px; font-weight: 600; margin-bottom: 15px;">最近通知</div>
                            <el-timeline>
                                <el-timeline-item>新的审批任务</el-timeline-item>
                                <el-timeline-item>考勤异常提醒</el-timeline-item>
                                <el-timeline-item>系统维护通知</el-timeline-item>
                            </el-timeline>
                        </div>
                    </div>
                </div>
            `
        });

        app.component('page-approval', {
            template: `
                <div class="approval-page">
                    <div style="font-size: 24px; font-weight: 600; margin-bottom: 20px;">审批管理</div>
                    <div style="background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.1);">
                        <el-table :data="[]" border stripe>
                            <el-table-column prop="id" label="编号"></el-table-column>
                            <el-table-column prop="type" label="类型"></el-table-column>
                            <el-table-column prop="title" label="标题"></el-table-column>
                            <el-table-column prop="status" label="状态"></el-table-column>
                            <el-table-column prop="createTime" label="创建时间"></el-table-column>
                        </el-table>
                        <div style="text-align: center; padding: 40px; color: #999;">暂无审批记录</div>
                    </div>
                </div>
            `
        });

        app.component('page-notice', {
            template: `
                <div class="notice-page">
                    <div style="font-size: 24px; font-weight: 600; margin-bottom: 20px;">通知中心</div>
                    <div style="background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.1);">
                        <el-timeline>
                            <el-timeline-item>新的审批任务</el-timeline-item>
                            <el-timeline-item>考勤异常提醒</el-timeline-item>
                            <el-timeline-item>系统维护通知</el-timeline-item>
                        </el-timeline>
                    </div>
                </div>
            `
        });

        app.component('page-meeting', {
            template: `
                <div class="meeting-page">
                    <el-tabs v-model="activeTab" type="border-card" @tab-change="handleTabChange">
                        <el-tab-pane label="会议室管理" name="rooms">
                            <div class="page-header">
                                <h2>会议室管理</h2>
                                <div class="header-right">
                                    <el-button type="primary" @click="showRoomDialog = true">添加会议室</el-button>
                                </div>
                            </div>
                            <div style="background: #fff; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.1);">
                                <el-table :data="rooms" border stripe>
                                    <el-table-column prop="id" label="ID"></el-table-column>
                                    <el-table-column prop="roomName" label="会议室名称"></el-table-column>
                                    <el-table-column prop="roomCode" label="编码"></el-table-column>
                                    <el-table-column prop="capacity" label="容纳人数"></el-table-column>
                                    <el-table-column prop="location" label="位置"></el-table-column>
                                    <el-table-column prop="status" label="状态">
                                        <template #default="{ row }">
                                            <el-tag :type="row.status === 1 ? 'success' : 'danger'">
                                                {{ row.status === 1 ? '可用' : '已停用' }}
                                            </el-tag>
                                        </template>
                                    </el-table-column>
                                    <el-table-column label="操作">
                                        <template #default="{ row }">
                                            <el-button size="small" @click="editRoom(row)">编辑</el-button>
                                            <el-button size="small" :type="row.status === 1 ? 'warning' : 'success'" 
                                                       @click="toggleRoomStatus(row)">
                                                {{ row.status === 1 ? '停用' : '启用' }}
                                            </el-button>
                                        </template>
                                    </el-table-column>
                                </el-table>
                            </div>
                        </el-tab-pane>

                        <el-tab-pane label="预约会议" name="reserve">
                            <div class="page-header">
                                <h2>预约会议</h2>
                            </div>
                            <div style="background: #fff; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.1); padding: 20px;">
                                <el-form :model="reservationForm" label-width="100px">
                                    <el-form-item label="选择会议室">
                                        <el-select v-model="reservationForm.roomId" placeholder="请选择会议室">
                                            <el-option v-for="room in availableRooms" :key="room.id" 
                                                        :label="room.roomName + ' (' + room.capacity + '人)'" 
                                                        :value="room.id"></el-option>
                                        </el-select>
                                    </el-form-item>
                                    <el-form-item label="会议主题">
                                        <el-input v-model="reservationForm.meetingTitle" placeholder="请输入会议主题"></el-input>
                                    </el-form-item>
                                    <el-form-item label="开始时间">
                                        <el-date-picker v-model="reservationForm.startTime" type="datetime" placeholder="选择开始时间"></el-date-picker>
                                    </el-form-item>
                                    <el-form-item label="结束时间">
                                        <el-date-picker v-model="reservationForm.endTime" type="datetime" placeholder="选择结束时间"></el-date-picker>
                                    </el-form-item>
                                    <el-form-item label="会议说明">
                                        <el-input v-model="reservationForm.description" type="textarea" placeholder="请输入会议说明"></el-input>
                                    </el-form-item>
                                    <el-form-item>
                                        <el-button type="primary" @click="checkAvailability">检查可用性</el-button>
                                        <el-button type="success" @click="submitReservation">提交预约</el-button>
                                        <el-button @click="resetForm">重置</el-button>
                                    </el-form-item>
                                </el-form>
                                <div v-if="availabilityChecked" style="margin-top: 15px; padding: 15px; border-radius: 8px;"
                                     :class="isAvailable ? 'available-message' : 'unavailable-message'">
                                    <span>{{ isAvailable ? '✓ 该时间段可用' : '✗ 该时间段已被占用，请选择其他时间' }}</span>
                                </div>
                            </div>
                        </el-tab-pane>

                        <el-tab-pane label="我的预约" name="myreservations">
                            <div class="page-header">
                                <h2>我的预约记录</h2>
                            </div>
                            <div style="background: #fff; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.1);">
                                <el-table :data="myReservations" border stripe>
                                    <el-table-column prop="reservationNo" label="预约单号"></el-table-column>
                                    <el-table-column prop="roomId" label="会议室">
                                        <template #default="{ row }">
                                            {{ getRoomName(row.roomId) }}
                                        </template>
                                    </el-table-column>
                                    <el-table-column prop="meetingTitle" label="会议主题"></el-table-column>
                                    <el-table-column prop="startTime" label="开始时间"></el-table-column>
                                    <el-table-column prop="endTime" label="结束时间"></el-table-column>
                                    <el-table-column prop="status" label="状态">
                                        <template #default="{ row }">
                                            <el-tag :type="row.status === 1 ? 'success' : 'info'">
                                                {{ row.status === 1 ? '有效' : '已取消' }}
                                            </el-tag>
                                        </template>
                                    </el-table-column>
                                    <el-table-column label="操作">
                                        <template #default="{ row }">
                                            <el-button v-if="row.status === 1" size="small" type="danger" 
                                                       @click="cancelReservation(row)">取消</el-button>
                                        </template>
                                    </el-table-column>
                                </el-table>
                            </div>
                        </el-tab-pane>

                        <el-tab-pane label="日历视图" name="calendar">
                            <div class="page-header">
                                <h2>会议室日历</h2>
                                <div class="header-right">
                                    <el-select v-model="calendarRoomId" placeholder="选择会议室">
                                        <el-option :value="null" label="所有会议室"></el-option>
                                        <el-option v-for="room in availableRooms" :key="room.id" 
                                                    :label="room.roomName" :value="room.id"></el-option>
                                    </el-select>
                                </div>
                            </div>
                            <div style="background: #fff; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.1); padding: 20px;">
                                <el-calendar v-model="calendarDate">
                                    <template #dateCell="{ data }">
                                        <div class="calendar-cell">
                                            <span class="date-num">{{ data.day }}</span>
                                            <div v-if="getDayReservations(data.date).length > 0" style="width: 100%; margin-top: 4px;">
                                                <div v-for="(res, idx) in getDayReservations(data.date).slice(0, 2)" :key="idx"
                                                     style="font-size: 10px; padding: 2px 4px; margin-bottom: 2px; border-radius: 4px; text-align: center; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;"
                                                     :class="getRoomClass(res.roomId)">
                                                    {{ getRoomName(res.roomId) }}: {{ formatTime(res.startTime) }}
                                                </div>
                                                <div v-if="getDayReservations(data.date).length > 2" 
                                                     style="font-size: 10px; color: #999; text-align: center;">
                                                    +{{ getDayReservations(data.date).length - 2 }}项
                                                </div>
                                            </div>
                                        </div>
                                    </template>
                                </el-calendar>
                            </div>
                        </el-tab-pane>
                    </el-tabs>

                    <el-dialog v-model="showRoomDialog" title="添加会议室" width="400px">
                        <el-form :model="roomForm" label-width="80px">
                            <el-form-item label="会议室名称">
                                <el-input v-model="roomForm.roomName"></el-input>
                            </el-form-item>
                            <el-form-item label="会议室编码">
                                <el-input v-model="roomForm.roomCode"></el-input>
                            </el-form-item>
                            <el-form-item label="容纳人数">
                                <el-input-number v-model="roomForm.capacity" :min="1"></el-input-number>
                            </el-form-item>
                            <el-form-item label="位置">
                                <el-input v-model="roomForm.location"></el-input>
                            </el-form-item>
                        </el-form>
                        <template #footer>
                            <el-button @click="showRoomDialog = false">取消</el-button>
                            <el-button type="primary" @click="saveRoom">确定</el-button>
                        </template>
                    </el-dialog>
                </div>
            `,
            setup() {
                const { ref, onMounted } = Vue;
                const { ElMessage } = ElementPlus;

                const activeTab = ref('rooms');
                const rooms = ref([]);
                const availableRooms = ref([]);
                const myReservations = ref([]);
                const calendarReservations = ref([]);
                const calendarDate = ref(new Date());
                const calendarRoomId = ref(null);

                const showRoomDialog = ref(false);
                const roomForm = ref({ roomName: '', roomCode: '', capacity: 10, location: '' });
                const editingRoom = ref(null);

                const reservationForm = ref({
                    roomId: null,
                    meetingTitle: '',
                    startTime: null,
                    endTime: null,
                    description: ''
                });
                const availabilityChecked = ref(false);
                const isAvailable = ref(false);

                const roomColors = {
                    1: 'background: #e6f7ff; color: #1890ff;',
                    2: 'background: #f6ffed; color: #52c41a;',
                    3: 'background: #fffbe6; color: #faad14;',
                    4: 'background: #fff1f0; color: #f5222d;',
                    5: 'background: #f9f0ff; color: #722ed1;'
                };

                const getRoomColor = (roomId) => {
                    const keys = Object.keys(roomColors);
                    const idx = (roomId - 1) % keys.length;
                    return roomColors[keys[idx]] || roomColors[1];
                };

                const getRoomClass = (roomId) => {
                    const classes = {
                        1: 'room-color-1',
                        2: 'room-color-2',
                        3: 'room-color-3',
                        4: 'room-color-4',
                        5: 'room-color-5'
                    };
                    const idx = (roomId - 1) % 5;
                    return classes[idx + 1] || 'room-color-1';
                };

                const loadRooms = async () => {
                    try {
                        const res = await axios.get('/api/meeting/rooms/all');
                        if (res.data.code === 200) {
                            rooms.value = res.data.data;
                        }
                        const availableRes = await axios.get('/api/meeting/rooms');
                        if (availableRes.data.code === 200) {
                            availableRooms.value = availableRes.data.data;
                        }
                    } catch (e) {
                        console.error('加载会议室失败', e);
                    }
                };

                const loadMyReservations = async () => {
                    try {
                        const res = await axios.get('/api/meeting/reservations/my');
                        if (res.data.code === 200) {
                            myReservations.value = res.data.data;
                        }
                    } catch (e) {
                        console.error('加载预约失败', e);
                    }
                };

                const loadCalendarData = async () => {
                    const startDate = formatDate(calendarDate.value);
                    const endDate = formatDate(addDays(calendarDate.value, 30));
                    try {
                        const url = `/api/meeting/calendar?startDate=${startDate}&endDate=${endDate}`;
                        const res = await axios.get(url);
                        if (res.data.code === 200) {
                            calendarReservations.value = res.data.data.reservations;
                        }
                    } catch (e) {
                        console.error('加载日历数据失败', e);
                    }
                };

                const saveRoom = async () => {
                    if (!roomForm.value.roomName || !roomForm.value.roomCode) {
                        ElMessage.warning('请填写会议室名称和编码');
                        return;
                    }
                    try {
                        const res = await axios.post('/api/meeting/rooms', roomForm.value);
                        if (res.data.code === 200) {
                            ElMessage.success('会议室创建成功');
                            showRoomDialog.value = false;
                            roomForm.value = { roomName: '', roomCode: '', capacity: 10, location: '' };
                            loadRooms();
                        }
                    } catch (e) {
                        ElMessage.error('创建失败');
                    }
                };

                const editRoom = (row) => {
                    editingRoom.value = row;
                    roomForm.value = { ...row };
                    showRoomDialog.value = true;
                };

                const toggleRoomStatus = async (row) => {
                    try {
                        const res = await axios.put(`/api/meeting/rooms/${row.id}`, {
                            ...row,
                            status: row.status === 1 ? 0 : 1
                        });
                        if (res.data.code === 200) {
                            ElMessage.success(row.status === 1 ? '已停用' : '已启用');
                            loadRooms();
                        }
                    } catch (e) {
                        ElMessage.error('操作失败');
                    }
                };

                const checkAvailability = async () => {
                    if (!reservationForm.value.roomId || !reservationForm.value.startTime || !reservationForm.value.endTime) {
                        ElMessage.warning('请先选择会议室和时间');
                        return;
                    }
                    const startTime = formatDateTime(reservationForm.value.startTime);
                    const endTime = formatDateTime(reservationForm.value.endTime);
                    try {
                        const res = await axios.get('/api/meeting/calendar', {
                            params: {
                                roomId: reservationForm.value.roomId,
                                startDate: startTime.split('T')[0],
                                endDate: endTime.split('T')[0]
                            }
                        });
                        if (res.data.code === 200) {
                            const reservations = res.data.data.reservations;
                            isAvailable.value = !reservations.some(r => 
                                checkTimeOverlap(r.startTime, r.endTime, startTime, endTime)
                            );
                            availabilityChecked.value = true;
                        }
                    } catch (e) {
                        ElMessage.error('检查失败');
                    }
                };

                const checkTimeOverlap = (existingStart, existingEnd, newStart, newEnd) => {
                    return !(new Date(existingEnd) <= new Date(newStart) || 
                             new Date(existingStart) >= new Date(newEnd));
                };

                const submitReservation = async () => {
                    if (!reservationForm.value.roomId || !reservationForm.value.meetingTitle || 
                        !reservationForm.value.startTime || !reservationForm.value.endTime) {
                        ElMessage.warning('请填写完整信息');
                        return;
                    }
                    const startTime = formatDateTime(reservationForm.value.startTime);
                    const endTime = formatDateTime(reservationForm.value.endTime);
                    try {
                        const res = await axios.post('/api/meeting/reservations', {
                            roomId: reservationForm.value.roomId,
                            meetingTitle: reservationForm.value.meetingTitle,
                            startTime: startTime,
                            endTime: endTime,
                            description: reservationForm.value.description
                        });
                        if (res.data.code === 200) {
                            ElMessage.success('预约成功');
                            resetForm();
                            loadMyReservations();
                            loadCalendarData();
                        } else {
                            ElMessage.error(res.data.msg);
                        }
                    } catch (e) {
                        ElMessage.error(e.response?.data?.msg || '预约失败');
                    }
                };

                const resetForm = () => {
                    reservationForm.value = {
                        roomId: null,
                        meetingTitle: '',
                        startTime: null,
                        endTime: null,
                        description: ''
                    };
                    availabilityChecked.value = false;
                    isAvailable.value = false;
                };

                const cancelReservation = async (row) => {
                    try {
                        const res = await axios.delete(`/api/meeting/reservations/${row.id}`);
                        if (res.data.code === 200) {
                            ElMessage.success('已取消');
                            loadMyReservations();
                            loadCalendarData();
                        } else {
                            ElMessage.error(res.data.msg);
                        }
                    } catch (e) {
                        ElMessage.error(e.response?.data?.msg || '取消失败');
                    }
                };

                const getRoomName = (roomId) => {
                    const room = rooms.value.find(r => r.id === roomId);
                    return room ? room.roomName : '未知';
                };

                const getDayReservations = (date) => {
                    const dateStr = formatDate(date);
                    return calendarReservations.value.filter(r => {
                        if (calendarRoomId.value && r.roomId !== calendarRoomId.value) return false;
                        const resDate = r.startTime.split('T')[0];
                        return resDate === dateStr;
                    });
                };

                const formatDate = (date) => {
                    const d = new Date(date);
                    return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
                };

                const formatDateTime = (date) => {
                    const d = new Date(date);
                    return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}T${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}:00`;
                };

                const formatTime = (datetimeStr) => {
                    return datetimeStr.split('T')[1]?.slice(0, 5) || '';
                };

                const addDays = (date, days) => {
                    const d = new Date(date);
                    d.setDate(d.getDate() + days);
                    return d;
                };

                const handleTabChange = (tab) => {
                    if (tab === 'myreservations') {
                        loadMyReservations();
                    } else if (tab === 'calendar') {
                        loadCalendarData();
                    }
                };

                onMounted(() => {
                    loadRooms();
                });

                return {
                    activeTab,
                    rooms,
                    availableRooms,
                    myReservations,
                    calendarReservations,
                    calendarDate,
                    calendarRoomId,
                    showRoomDialog,
                    roomForm,
                    editingRoom,
                    reservationForm,
                    availabilityChecked,
                    isAvailable,
                    getRoomColor,
                    getRoomClass,
                    loadRooms,
                    loadMyReservations,
                    loadCalendarData,
                    saveRoom,
                    editRoom,
                    toggleRoomStatus,
                    checkAvailability,
                    submitReservation,
                    resetForm,
                    cancelReservation,
                    getRoomName,
                    getDayReservations,
                    formatTime,
                    handleTabChange
                };
            }
        });

        app.use(ElementPlus);
        app.mount('#app');
    </script>
    <script src="js/pages/attendance.js"></script>
    <script src="js/pages/report.js"></script>
</body>
</html>
