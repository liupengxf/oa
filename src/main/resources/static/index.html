<!DOCTYPE html>
<html lang="zh-CN" charset="UTF-8">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>OA协同办公平台</title>
    <script src="https://unpkg.com/vue@3.4.21/dist/vue.global.js"></script>
    <script src="https://unpkg.com/element-plus@2.4.4/dist/index.full.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/element-plus@2.4.4/dist/index.css">
    <script src="https://cdn.jsdelivr.net/npm/axios@1.6.8/dist/axios.min.js"></script>
    <script src="lib/wangeditor/index.js"></script>
    <link rel="stylesheet" href="lib/wangeditor/style.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; }
        .app-container { display: flex; height: 100vh; }
        .sidebar { width: 200px; background: #263445; color: #fff; display: flex; flex-direction: column; }
        .sidebar-header { padding: 20px; text-align: center; border-bottom: 1px solid #3a4d63; }
        .sidebar-header h1 { font-size: 18px; font-weight: 600; }
        .nav-menu { flex: 1; padding: 10px 0; }
        .nav-item { padding: 12px 20px; cursor: pointer; display: flex; align-items: center; gap: 10px; transition: background 0.2s; }
        .nav-item:hover { background: #3a4d63; }
        .nav-item.active { background: #1890ff; }
        .nav-item .icon { font-size: 18px; }
        .main-content { flex: 1; display: flex; flex-direction: column; background: #f0f2f5; }
        .top-bar { height: 60px; background: #fff; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
        .top-bar-left { display: flex; align-items: center; gap: 10px; }
        .top-bar-right { display: flex; align-items: center; gap: 20px; }
        .content-area { flex: 1; overflow-y: auto; padding: 20px; }
        .el-select { width: 100% !important; }
        .el-input__inner { color: #333 !important; }
        .notice-page { padding: 20px; }
        .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .page-title { font-size: 26px; font-weight: bold; display: flex; align-items: center; gap: 8px; }
        .bell-icon { color: #e6a23c; }
        .page-operate { display: flex; align-items: center; gap: 12px; }
        .unread-count-text { color: #f56c6c; font-size: 18px; font-weight: bold; }
        .msg-list-title { font-size: 18px; margin-bottom: 12px; }
        .msg-item { padding: 16px 12px; border-bottom: 1px solid #eee; cursor: pointer; transition: background 0.2s; }
        .msg-item:hover { background-color: #f7f8fa; }
        .msg-top-row { display: flex; justify-content: space-between; align-items: center; }
        .msg-title-row { display: flex; align-items: center; gap: 10px; }
        .dot-unread { width: 8px; height: 8px; border-radius: 50%; background-color: #f56c6c; display: inline-block; }
        .msg-title { font-size: 17px; font-weight: 600; }
        .msg-time { color: #909399; font-size: 14px; }
        .msg-desc { margin-top: 6px; color: #606266; font-size: 15px; padding-left: 18px; }
        .dashboard-page { padding: 20px; }
    </style>
</head>
<body>
    <div id="app">
        <div class="app-container">
            <div class="sidebar">
                <div class="sidebar-header">
                    <h1>OA办公平台</h1>
                </div>
                <div class="nav-menu">
                    <div v-for="menu in menus" :key="menu.id" 
                         class="nav-item" :class="{ active: currentMenu === menu.path }"
                         @click="navigate(menu.path)">
                        <span class="icon">{{ getIcon(menu.icon) }}</span>
                        <span>{{ menu.menuName }}</span>
                    </div>
                </div>
            </div>
            <div class="main-content">
                <div class="top-bar">
                    <div class="top-bar-left">
                        <span style="font-size: 20px; font-weight: 600;">{{ getCurrentMenuName() }}</span>
                    </div>
                    <div class="top-bar-right">
                        <el-badge :value="unreadCount" class="item">
                            <el-button icon="Bell" @click="navigate('/notice')"></el-button>
                        </el-badge>
                        <span>{{ currentEmployee?.name || '用户' }}</span>
                    </div>
                </div>
                <div class="content-area">
                    <component :is="currentComponent" :key="currentMenu"></component>
                </div>
            </div>
        </div>
    </div>

    <script>
        const { createApp, ref, computed, onMounted } = Vue;

        const app = createApp({
            setup() {
                const currentEmployee = ref(null);
                const currentMenu = ref('/dashboard');
                const menus = ref([
                    { id: 1, menuName: '工作台', path: '/dashboard', icon: 'DataBoard' },
                    { id: 2, menuName: '考勤管理', path: '/attendance', icon: 'Calendar' },
                    { id: 3, menuName: '审批管理', path: '/approval', icon: 'Document' },
                    { id: 4, menuName: '会议预约', path: '/meeting', icon: 'Meeting' },
                    { id: 5, menuName: '通知中心', path: '/notice', icon: 'Bell' },
                    { id: 6, menuName: '数据看板', path: '/report', icon: 'DataAnalysis' }
                ]);
                const unreadCount = ref(0);

                const componentMap = {
                    '/dashboard': 'page-dashboard',
                    '/attendance': 'page-attendance',
                    '/approval': 'page-approval',
                    '/meeting': 'page-meeting',
                    '/notice': 'page-notice',
                    '/report': 'page-report'
                };

                const currentComponent = computed(() => componentMap[currentMenu.value] || 'page-dashboard');

                const loadCurrentEmployee = async () => {
                    try {
                        const res = await axios.get('/api/employee/1');
                        if (res.data.code === 200) {
                            currentEmployee.value = res.data.data;
                        }
                    } catch (e) {
                        console.error('加载员工信息失败', e);
                    }
                };

                const getIcon = (icon) => {
                    const icons = {
                        'DataBoard': '📊',
                        'Calendar': '📅',
                        'Document': '📋',
                        'Bell': '🔔',
                        'DataAnalysis': '📈',
                        'Meeting': '🤝'
                    };
                    return icons[icon] || '📄';
                };

                const getCurrentMenuName = () => {
                    const menu = menus.value.find(m => m.path === currentMenu.value);
                    return menu ? menu.menuName : '工作台';
                };

                const navigate = (path) => {
                    currentMenu.value = path;
                };

                onMounted(() => {
                    loadCurrentEmployee();
                });

                return {
                    currentEmployee,
                    currentMenu,
                    menus,
                    unreadCount,
                    currentComponent,
                    getIcon,
                    getCurrentMenuName,
                    navigate
                };
            }
        });

        app.component('page-dashboard', {
            template: `
                <div class="dashboard-page">
                    <div style="font-size: 24px; font-weight: 600; margin-bottom: 20px;">欢迎来到工作台</div>
                    <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px;">
                        <div style="background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.1);">
                            <div style="font-size: 14px; color: #666;">今日待办</div>
                            <div style="font-size: 32px; font-weight: 600; color: #333; margin-top: 10px;">5</div>
                        </div>
                        <div style="background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.1);">
                            <div style="font-size: 14px; color: #666;">待审批</div>
                            <div style="font-size: 32px; font-weight: 600; color: #333; margin-top: 10px;">3</div>
                        </div>
                        <div style="background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.1);">
                            <div style="font-size: 14px; color: #666;">新通知</div>
                            <div style="font-size: 32px; font-weight: 600; color: #333; margin-top: 10px;">2</div>
                        </div>
                        <div style="background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.1);">
                            <div style="font-size: 14px; color: #666;">本月考勤</div>
                            <div style="font-size: 32px; font-weight: 600; color: #333; margin-top: 10px;">22天</div>
                        </div>
                    </div>
                </div>
            `
        });

        window.appInstance = app;
    </script>

    <script src="js/pages/attendance.js?v=NEWVERSION002"></script>
    <script src="js/pages/meeting.js?v=NEWVERSION002"></script>
    <script src="js/pages/report.js?v=NEWVERSION002"></script>
    <script src="js/pages/approval.js?v=NEWVERSION002"></script>
    <script src="js/pages/notice.js?v=NEWVERSION002"></script>
    
    <script>
        window.appInstance.use(ElementPlus);
        window.appInstance.mount('#app');
    </script>
</body>
</html>
